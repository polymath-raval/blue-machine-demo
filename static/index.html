<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0818;
      color: rgba(255,255,255,0.88);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Animated gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,60,220,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(30,80,200,.3) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(80,20,160,.2) 0%, transparent 60%),
        linear-gradient(160deg, #0b0818 0%, #110d24 50%, #0a1228 100%);
      z-index: 0;
      pointer-events: none;
    }

    header, #chat, #status-bar, #controls { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(90deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header span { font-size: .72rem; color: rgba(255,255,255,0.35); }
    #clear-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .78rem;
      transition: all .2s;
      backdrop-filter: blur(8px);
    }
    #clear-btn:hover {
      background: rgba(192,132,252,0.15);
      border-color: rgba(192,132,252,0.5);
      color: #c084fc;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: .92rem;
      animation: fadeIn .25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .msg.user {
      align-self: flex-end;
      background: rgba(129,96,255,0.45);
      border: 1px solid rgba(168,139,255,0.35);
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 20px rgba(129,96,255,0.2);
    }
    .msg.bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 5px;
    }
    .msg .label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: 4px;
    }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: .78rem;
      color: rgba(255,255,255,0.3);
      padding: 6px;
      min-height: 28px;
      flex-shrink: 0;
      letter-spacing: .02em;
    }
    #status-bar.recording { color: #f87171; }
    #status-bar.processing { color: #a78bfa; }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 28px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #mic-btn:hover {
      background: rgba(192,132,252,0.18);
      border-color: rgba(192,132,252,0.4);
      box-shadow: 0 4px 28px rgba(192,132,252,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #mic-btn.recording {
      background: rgba(239,68,68,0.3);
      border-color: rgba(239,68,68,0.6);
      box-shadow: 0 0 0 8px rgba(239,68,68,0.12), 0 0 40px rgba(239,68,68,0.25);
      animation: pulse 1.2s infinite;
    }
    #mic-btn.processing {
      background: rgba(129,96,255,0.25);
      border-color: rgba(129,96,255,0.5);
      box-shadow: 0 0 28px rgba(129,96,255,0.3);
      cursor: not-allowed;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(239,68,68,0.12), 0 0 40px rgba(239,68,68,0.2); }
      50%       { box-shadow: 0 0 0 16px rgba(239,68,68,0.06), 0 0 60px rgba(239,68,68,0.15); }
    }

    #mic-btn svg { pointer-events: none; }

    #hint {
      font-size: .72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: .02em;
    }

    /* ── LLM / TTS selectors ── */
    #llm-row, #tts-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
    }
    .row-label {
      font-size: .68rem;
      color: rgba(255,255,255,0.25);
      min-width: 32px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .engine-btn {
      padding: 4px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: .76rem;
      transition: all .18s;
    }
    .engine-btn:hover {
      background: rgba(192,132,252,0.1);
      border-color: rgba(192,132,252,0.3);
      color: rgba(192,132,252,0.8);
    }
    .engine-btn.active {
      background: rgba(192,132,252,0.18);
      border-color: rgba(192,132,252,0.55);
      color: #c084fc;
      box-shadow: 0 0 12px rgba(192,132,252,0.2);
    }
    #voice-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: .76rem;
      cursor: pointer;
      max-width: 220px;
      backdrop-filter: blur(8px);
    }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🎙 Vox</h1>
  <span id="model-badge">qwen3.5:2b · whisper-small</span>
  <button id="clear-btn">Clear</button>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="label">Bot</div>
    Hello! Hold the button or press <strong>Space</strong> to talk.
  </div>
</div>

<div id="status-bar">Ready</div>

<div id="controls">
  <button id="mic-btn" title="Hold to talk">
    <!-- mic icon -->
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.94V22h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.06A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
    </svg>
  </button>

  <!-- LLM engine picker -->
  <div id="llm-row">
    <span class="row-label">LLM</span>
    <button class="engine-btn active" data-llm="ollama">Ollama</button>
    <button class="engine-btn" data-llm="openrouter">OpenRouter</button>
  </div>

  <!-- TTS engine + voice picker -->
  <div id="tts-row">
    <span class="row-label">TTS</span>
    <button class="engine-btn active" data-engine="kokoro">Kokoro</button>
    <button class="engine-btn" data-engine="edge">Edge TTS</button>
    <select id="voice-select"></select>
  </div>

  <span id="hint">Hold Space or hold button to talk</span>
</div>

<script>
  const chat = document.getElementById('chat');
  const micBtn = document.getElementById('mic-btn');
  const statusBar = document.getElementById('status-bar');
  const clearBtn = document.getElementById('clear-btn');
  const voiceSelect = document.getElementById('voice-select');
  const engineBtns = document.querySelectorAll('[data-engine]');
  const llmBtns = document.querySelectorAll('[data-llm]');
  const modelBadge = document.getElementById('model-badge');

  let currentLlmEngine = 'ollama';

  let mediaRecorder = null;
  let audioChunks = [];
  let stream = null;
  let isRecording = false;
  let isProcessing = false;

  // ── AudioContext (unlocked on first user gesture — required for Safari) ──
  let audioCtx = null;
  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  async function playAudioB64(base64data) {
    ensureAudioContext();
    const bytes = Uint8Array.from(atob(base64data), c => c.charCodeAt(0));
    const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
    return new Promise(resolve => { source.onended = resolve; });
  }

  // ── TTS engine / voice state ──
  let allVoices = { kokoro: {}, edge: {} };
  let currentEngine = 'kokoro';

  async function loadVoices() {
    const res = await fetch('/voices');
    allVoices = await res.json();
    populateVoices('kokoro');
  }

  function populateVoices(engine) {
    voiceSelect.innerHTML = '';
    const voices = allVoices[engine] || {};
    for (const [id, label] of Object.entries(voices)) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = label;
      voiceSelect.appendChild(opt);
    }
  }

  engineBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      engineBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentEngine = btn.dataset.engine;
      populateVoices(currentEngine);
    });
  });

  const LLM_BADGES = {
    ollama: 'qwen3.5:2b · whisper-small',
    openrouter: 'gpt-oss-120b · whisper-small',
  };

  llmBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      llmBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLlmEngine = btn.dataset.llm;
      modelBadge.textContent = LLM_BADGES[currentLlmEngine];
    });
  });

  loadVoices();

  function setStatus(text, cls = '') {
    statusBar.textContent = text;
    statusBar.className = cls;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Bot';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = '<div class="label">Bot</div><em style="opacity:.5">Thinking…</em>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function getStream() {
    if (!stream) {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    return stream;
  }

  async function startRecording() {
    if (isRecording || isProcessing) return;
    ensureAudioContext(); // unlock on user gesture so Safari allows later playback
    try {
      const s = await getStream();
      audioChunks = [];
      mediaRecorder = new MediaRecorder(s);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      setStatus('Recording… release to send', 'recording');
    } catch (err) {
      setStatus('Microphone access denied');
      console.error(err);
    }
  }

  async function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    micBtn.classList.remove('recording');

    return new Promise(resolve => {
      mediaRecorder.onstop = async () => {
        const mimeType = mediaRecorder.mimeType || 'audio/webm';
        const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob(audioChunks, { type: mimeType });
        audioChunks = [];
        await sendAudio(blob, ext);
        resolve();
      };
      mediaRecorder.stop();
    });
  }

  async function sendAudio(blob, ext) {
    if (blob.size < 1000) {
      setStatus('Recording too short, try again');
      return;
    }

    isProcessing = true;
    micBtn.classList.add('processing');
    setStatus('Transcribing…', 'processing');

    let thinkingEl = null;

    try {
      // ── Step 1: Transcribe ──
      const sttForm = new FormData();
      sttForm.append('audio', blob, `audio.${ext}`);

      const sttRes = await fetch('/transcribe', { method: 'POST', body: sttForm });
      const sttData = await sttRes.json();

      if (sttData.error) {
        setStatus(sttData.error);
        return;
      }

      // Show user message immediately after transcription
      addMessage('user', sttData.transcription);
      thinkingEl = addThinking();
      setStatus('Thinking…', 'processing');

      // ── Step 2: LLM + TTS ──
      const respondForm = new FormData();
      respondForm.append('text', sttData.transcription);
      respondForm.append('tts_engine', currentEngine);
      respondForm.append('voice', voiceSelect.value);
      respondForm.append('llm_engine', currentLlmEngine);

      const res = await fetch('/respond', { method: 'POST', body: respondForm });
      const data = await res.json();

      thinkingEl.remove();
      thinkingEl = null;

      if (data.error) {
        setStatus(data.error);
        return;
      }

      addMessage('bot', data.response);

      // Play TTS audio via AudioContext (works on Safari — bypasses autoplay block)
      if (data.audio) {
        await playAudioB64(data.audio).catch(console.error);
      }

      setStatus('Ready');
    } catch (err) {
      if (thinkingEl) thinkingEl.remove();
      setStatus('Error: ' + err.message);
      console.error(err);
    } finally {
      isProcessing = false;
      micBtn.classList.remove('processing');
    }
  }

  // ── Button: hold to talk ──
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('mouseup',   () => stopRecording());
  micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

  // Touch support
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
  micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); }, { passive: false });

  // ── Keyboard: Space to talk ──
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body && !e.repeat) {
      e.preventDefault();
      startRecording();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      stopRecording();
    }
  });

  // ── Clear ──
  clearBtn.addEventListener('click', async () => {
    await fetch('/clear', { method: 'POST' });
    chat.innerHTML = '';
    addMessage('bot', 'Conversation cleared. Ready to chat!');
    setStatus('Ready');
  });
</script>
</body>
</html>
