<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
    header span { font-size: .75rem; color: #8b949e; }
    #clear-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
      transition: border-color .2s, color .2s;
    }
    #clear-btn:hover { border-color: #58a6ff; color: #58a6ff; }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.5;
      font-size: .92rem;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .msg.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #21262d;
      border-bottom-left-radius: 4px;
    }
    .msg .label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      opacity: .6;
      margin-bottom: 4px;
    }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: .8rem;
      color: #8b949e;
      padding: 6px;
      min-height: 28px;
      flex-shrink: 0;
    }
    #status-bar.recording { color: #f85149; }
    #status-bar.processing { color: #58a6ff; }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 24px;
      flex-shrink: 0;
      border-top: 1px solid #21262d;
    }

    #mic-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, box-shadow .15s, transform .1s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #mic-btn:hover { background: #30363d; }
    #mic-btn.recording {
      background: #da3633;
      box-shadow: 0 0 0 8px rgba(218,54,51,.2);
      animation: pulse 1s infinite;
    }
    #mic-btn.processing {
      background: #1f6feb;
      cursor: not-allowed;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(218,54,51,.2); }
      50%       { box-shadow: 0 0 0 14px rgba(218,54,51,.08); }
    }

    #mic-btn svg { pointer-events: none; }

    #hint {
      font-size: .74rem;
      color: #484f58;
    }

    /* ── TTS selector ── */
    #tts-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
    }
    .engine-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: none;
      color: #8b949e;
      cursor: pointer;
      font-size: .78rem;
      transition: all .15s;
    }
    .engine-btn.active {
      background: #21262d;
      border-color: #58a6ff;
      color: #58a6ff;
    }
    #voice-select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: .78rem;
      cursor: pointer;
      max-width: 220px;
    }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1>🎙 Voice Bot</h1>
  <span>qwen3.5:2b · whisper-small</span>
  <button id="clear-btn">Clear</button>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="label">Bot</div>
    Hello! Hold the button or press <strong>Space</strong> to talk.
  </div>
</div>

<div id="status-bar">Ready</div>

<div id="controls">
  <button id="mic-btn" title="Hold to talk">
    <!-- mic icon -->
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zm7 8a1 1 0 0 1 1 1 8 8 0 0 1-7 7.94V22h2a1 1 0 0 1 0 2H9a1 1 0 0 1 0-2h2v-2.06A8 8 0 0 1 4 12a1 1 0 0 1 2 0 6 6 0 0 0 12 0 1 1 0 0 1 1-1z"/>
    </svg>
  </button>

  <!-- TTS engine + voice picker -->
  <div id="tts-row">
    <button class="engine-btn active" data-engine="kokoro">Kokoro</button>
    <button class="engine-btn" data-engine="edge">Edge TTS</button>
    <select id="voice-select"></select>
  </div>

  <span id="hint">Hold Space or hold button to talk</span>
</div>

<script>
  const chat = document.getElementById('chat');
  const micBtn = document.getElementById('mic-btn');
  const statusBar = document.getElementById('status-bar');
  const clearBtn = document.getElementById('clear-btn');
  const voiceSelect = document.getElementById('voice-select');
  const engineBtns = document.querySelectorAll('.engine-btn');

  let mediaRecorder = null;
  let audioChunks = [];
  let stream = null;
  let isRecording = false;
  let isProcessing = false;

  // ── AudioContext (unlocked on first user gesture — required for Safari) ──
  let audioCtx = null;
  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  async function playAudioB64(base64data) {
    ensureAudioContext();
    const bytes = Uint8Array.from(atob(base64data), c => c.charCodeAt(0));
    const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
    return new Promise(resolve => { source.onended = resolve; });
  }

  // ── TTS engine / voice state ──
  let allVoices = { kokoro: {}, edge: {} };
  let currentEngine = 'kokoro';

  async function loadVoices() {
    const res = await fetch('/voices');
    allVoices = await res.json();
    populateVoices('kokoro');
  }

  function populateVoices(engine) {
    voiceSelect.innerHTML = '';
    const voices = allVoices[engine] || {};
    for (const [id, label] of Object.entries(voices)) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = label;
      voiceSelect.appendChild(opt);
    }
  }

  engineBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      engineBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentEngine = btn.dataset.engine;
      populateVoices(currentEngine);
    });
  });

  loadVoices();

  function setStatus(text, cls = '') {
    statusBar.textContent = text;
    statusBar.className = cls;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Bot';
    div.appendChild(label);
    div.appendChild(document.createTextNode(text));
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = '<div class="label">Bot</div><em style="opacity:.5">Thinking…</em>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function getStream() {
    if (!stream) {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    return stream;
  }

  async function startRecording() {
    if (isRecording || isProcessing) return;
    ensureAudioContext(); // unlock on user gesture so Safari allows later playback
    try {
      const s = await getStream();
      audioChunks = [];
      mediaRecorder = new MediaRecorder(s);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.start();
      isRecording = true;
      micBtn.classList.add('recording');
      setStatus('Recording… release to send', 'recording');
    } catch (err) {
      setStatus('Microphone access denied');
      console.error(err);
    }
  }

  async function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    micBtn.classList.remove('recording');

    return new Promise(resolve => {
      mediaRecorder.onstop = async () => {
        const mimeType = mediaRecorder.mimeType || 'audio/webm';
        const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob(audioChunks, { type: mimeType });
        audioChunks = [];
        await sendAudio(blob, ext);
        resolve();
      };
      mediaRecorder.stop();
    });
  }

  async function sendAudio(blob, ext) {
    if (blob.size < 1000) {
      setStatus('Recording too short, try again');
      return;
    }

    isProcessing = true;
    micBtn.classList.add('processing');
    setStatus('Processing…', 'processing');

    const thinkingEl = addThinking();

    try {
      const form = new FormData();
      form.append('audio', blob, `audio.${ext}`);
      form.append('tts_engine', currentEngine);
      form.append('voice', voiceSelect.value);

      const res = await fetch('/chat', { method: 'POST', body: form });
      const data = await res.json();

      thinkingEl.remove();

      if (data.error) {
        setStatus(data.error);
        return;
      }

      addMessage('user', data.transcription);
      addMessage('bot', data.response);

      // Play TTS audio via AudioContext (works on Safari — bypasses autoplay block)
      if (data.audio) {
        await playAudioB64(data.audio).catch(console.error);
      }

      setStatus('Ready');
    } catch (err) {
      thinkingEl.remove();
      setStatus('Error: ' + err.message);
      console.error(err);
    } finally {
      isProcessing = false;
      micBtn.classList.remove('processing');
    }
  }

  // ── Button: hold to talk ──
  micBtn.addEventListener('mousedown', e => { e.preventDefault(); startRecording(); });
  micBtn.addEventListener('mouseup',   () => stopRecording());
  micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });

  // Touch support
  micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); }, { passive: false });
  micBtn.addEventListener('touchend',   e => { e.preventDefault(); stopRecording(); }, { passive: false });

  // ── Keyboard: Space to talk ──
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body && !e.repeat) {
      e.preventDefault();
      startRecording();
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      stopRecording();
    }
  });

  // ── Clear ──
  clearBtn.addEventListener('click', async () => {
    await fetch('/clear', { method: 'POST' });
    chat.innerHTML = '';
    addMessage('bot', 'Conversation cleared. Ready to chat!');
    setStatus('Ready');
  });
</script>
</body>
</html>
