<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vox</title>
  <!-- Silero VAD: ONNX runtime + vad-web bundle -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.7/dist/bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0818;
      color: rgba(255,255,255,0.88);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Animated gradient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,60,220,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(30,80,200,.3) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(80,20,160,.2) 0%, transparent 60%),
        linear-gradient(160deg, #0b0818 0%, #110d24 50%, #0a1228 100%);
      z-index: 0;
      pointer-events: none;
    }

    header, #chat, #status-bar, #controls { position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(90deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header span { font-size: .72rem; color: rgba(255,255,255,0.35); }
    #clear-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .78rem;
      transition: all .2s;
      backdrop-filter: blur(8px);
    }
    #clear-btn:hover {
      background: rgba(192,132,252,0.15);
      border-color: rgba(192,132,252,0.5);
      color: #c084fc;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: .92rem;
      animation: fadeIn .25s ease;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .msg.user {
      align-self: flex-end;
      background: rgba(129,96,255,0.45);
      border: 1px solid rgba(168,139,255,0.35);
      border-bottom-right-radius: 5px;
      box-shadow: 0 4px 20px rgba(129,96,255,0.2);
    }
    .msg.bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-bottom-left-radius: 5px;
    }
    .msg .label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: 4px;
    }

    /* ── Status bar ── */
    #status-bar {
      text-align: center;
      font-size: .78rem;
      color: rgba(255,255,255,0.3);
      padding: 6px;
      min-height: 28px;
      flex-shrink: 0;
      letter-spacing: .02em;
    }
    #status-bar.recording  { color: #f87171; }
    #status-bar.processing { color: #a78bfa; }
    #status-bar.listening  { color: #4ade80; }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 20px 28px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    #mic-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .3s, border-color .3s, box-shadow .3s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    #mic-btn:hover:not(.in-call):not(.speaking):not(.processing) {
      background: rgba(192,132,252,0.18);
      border-color: rgba(192,132,252,0.4);
      box-shadow: 0 4px 28px rgba(192,132,252,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* In-call: green breathe */
    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.35), 0 4px 24px rgba(0,0,0,.3); }
      50%       { box-shadow: 0 0 0 18px rgba(34,197,94,.04), 0 0 44px rgba(34,197,94,.3); }
    }
    #mic-btn.in-call {
      background: rgba(34,197,94,0.18);
      border-color: rgba(34,197,94,0.5);
      animation: breathe 2s ease-in-out infinite;
    }

    /* Speaking: red pulse */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 8px rgba(239,68,68,0.12), 0 0 40px rgba(239,68,68,0.2); }
      50%       { box-shadow: 0 0 0 18px rgba(239,68,68,0.05), 0 0 60px rgba(239,68,68,0.15); }
    }
    #mic-btn.speaking {
      background: rgba(239,68,68,0.3);
      border-color: rgba(239,68,68,0.6);
      animation: pulse 1.2s infinite;
    }

    /* Processing: purple lock */
    #mic-btn.processing {
      background: rgba(129,96,255,0.25);
      border-color: rgba(129,96,255,0.5);
      box-shadow: 0 0 28px rgba(129,96,255,0.3);
      cursor: not-allowed;
      animation: none;
    }

    #mic-btn svg { pointer-events: none; }

    #hint {
      font-size: .72rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: .02em;
    }

    /* ── LLM / TTS selectors ── */
    #llm-row, #tts-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
    }
    .row-label {
      font-size: .68rem;
      color: rgba(255,255,255,0.25);
      min-width: 32px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .engine-btn {
      padding: 4px 13px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: .76rem;
      transition: all .18s;
    }
    .engine-btn:hover {
      background: rgba(192,132,252,0.1);
      border-color: rgba(192,132,252,0.3);
      color: rgba(192,132,252,0.8);
    }
    .engine-btn.active {
      background: rgba(192,132,252,0.18);
      border-color: rgba(192,132,252,0.55);
      color: #c084fc;
      box-shadow: 0 0 12px rgba(192,132,252,0.2);
    }
    #voice-select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: .76rem;
      cursor: pointer;
      max-width: 220px;
      backdrop-filter: blur(8px);
    }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>🎙 Vox</h1>
  <span id="model-badge">llama3.1:8b · whisper-small</span>
  <button id="clear-btn">Clear</button>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="label">Bot</div>
    Hello! Press <strong>Space</strong> or click the button to start a call.
  </div>
</div>

<div id="status-bar">Ready</div>

<div id="controls">
  <button id="mic-btn" title="Start call">
    <!-- Phone icon — replaced by JS on call start/end -->
    <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
      <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
    </svg>
  </button>

  <!-- LLM engine picker -->
  <div id="llm-row">
    <span class="row-label">LLM</span>
    <button class="engine-btn active" data-llm="ollama">Ollama</button>
    <button class="engine-btn" data-llm="openrouter">OpenRouter</button>
  </div>

  <!-- TTS engine + voice picker -->
  <div id="tts-row">
    <span class="row-label">TTS</span>
    <button class="engine-btn active" data-engine="kokoro">Kokoro</button>
    <button class="engine-btn" data-engine="edge">Edge TTS</button>
    <select id="voice-select"></select>
  </div>

  <span id="hint">Press Space or click to start a call · Space again to end</span>
</div>

<script>
  // ── DOM refs ──────────────────────────────────────────────────────────────────
  const chat        = document.getElementById('chat');
  const micBtn      = document.getElementById('mic-btn');
  const statusBar   = document.getElementById('status-bar');
  const clearBtn    = document.getElementById('clear-btn');
  const voiceSelect = document.getElementById('voice-select');
  const engineBtns  = document.querySelectorAll('[data-engine]');
  const llmBtns     = document.querySelectorAll('[data-llm]');
  const modelBadge  = document.getElementById('model-badge');
  const hint        = document.getElementById('hint');

  // ── App state ─────────────────────────────────────────────────────────────────
  let currentLlmEngine = 'ollama';
  let currentEngine    = 'kokoro';
  let allVoices        = { kokoro: {}, edge: {} };

  let inCall               = false;   // currently in a call session
  let vadInstance          = null;    // MicVAD instance (reused across calls)
  let isProcessingVAD      = false;   // true while STT/LLM/TTS pipeline is running
  let audioCtx             = null;

  // Stop-response support
  let currentAbortController = null;  // AbortController for in-flight fetch
  let currentAudioSource     = null;  // Active AudioBufferSourceNode
  let audioQueue             = [];    // Pending audio chunks (module-level for stopAll)
  let isPlayingAudio         = false;

  // CDN bases — versions pinned for reproducibility
  const VADWEB_CDN   = 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.7/dist/';
  const ONNXWASM_CDN = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/';

  // ── Button SVG icons ──────────────────────────────────────────────────────────
  const ICON_PHONE = `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
    <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2
             1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17
             0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
  </svg>`;

  // Hang-up icon (rotated phone)
  const ICON_HANG_UP = `<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85
             -.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08A.996.996 0 0 1 0 12.37
             c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.66
             c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29
             -.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85a.997.997 0 0 1-.56-.9
             V9.72C15.15 9.25 13.6 9 12 9z"/>
  </svg>`;

  // ── AudioContext (Safari requires unlock on user gesture) ─────────────────────
  function ensureAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  async function playAudioB64(base64data) {
    ensureAudioContext();
    const bytes = Uint8Array.from(atob(base64data), c => c.charCodeAt(0));
    const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
    const source = audioCtx.createBufferSource();
    currentAudioSource = source;
    source.buffer = audioBuffer;
    source.connect(audioCtx.destination);
    source.start(0);
    return new Promise(resolve => {
      source.onended = () => {
        if (currentAudioSource === source) currentAudioSource = null;
        resolve();
      };
    });
  }

  // ── TTS engine / voice selection ──────────────────────────────────────────────
  async function loadVoices() {
    const res = await fetch('/voices');
    allVoices = await res.json();
    populateVoices('kokoro');
  }

  function populateVoices(engine) {
    voiceSelect.innerHTML = '';
    const voices = allVoices[engine] || {};
    for (const [id, label] of Object.entries(voices)) {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = label;
      voiceSelect.appendChild(opt);
    }
  }

  engineBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      engineBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentEngine = btn.dataset.engine;
      populateVoices(currentEngine);
    });
  });

  const LLM_BADGES = {
    ollama:      'llama3.1:8b · whisper-small',
    openrouter:  'gpt-oss-120b · whisper-small',
  };

  llmBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      llmBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLlmEngine = btn.dataset.llm;
      modelBadge.textContent = LLM_BADGES[currentLlmEngine];
    });
  });

  loadVoices();

  // ── UI helpers ────────────────────────────────────────────────────────────────
  function setStatus(text, cls = '') {
    statusBar.textContent = text;
    statusBar.className = cls;
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'You' : 'Bot';
    const body = document.createElement('span');
    body.className = 'msg-body';
    body.textContent = text;
    div.appendChild(label);
    div.appendChild(body);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // ── WAV encoder (Float32 PCM → WAV Blob) ─────────────────────────────────────
  function encodeWAV(samples, sampleRate) {
    const buf = new ArrayBuffer(44 + samples.length * 2);
    const v   = new DataView(buf);
    const str = (off, s) => { for (let i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); };
    str(0, 'RIFF'); v.setUint32(4, 36 + samples.length * 2, true);
    str(8, 'WAVE'); str(12, 'fmt ');
    v.setUint32(16, 16, true);              // fmt chunk size
    v.setUint16(20, 1, true);              // PCM
    v.setUint16(22, 1, true);              // mono
    v.setUint32(24, sampleRate, true);
    v.setUint32(28, sampleRate * 2, true); // byte rate
    v.setUint16(32, 2, true);              // block align
    v.setUint16(34, 16, true);             // bits per sample
    str(36, 'data'); v.setUint32(40, samples.length * 2, true);
    let off = 44;
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return new Blob([buf], { type: 'audio/wav' });
  }

  // ── Silero VAD initialisation ─────────────────────────────────────────────────
  async function initVAD() {
    setStatus('Loading VAD model…', 'processing');

    // Fetch the AudioWorklet script as a blob so addModule() is same-origin
    const workletResp = await fetch(VADWEB_CDN + 'vad.worklet.bundle.min.js');
    const workletText = await workletResp.text();
    const workletURL  = URL.createObjectURL(
      new Blob([workletText], { type: 'application/javascript' })
    );

    vadInstance = await vad.MicVAD.new({
      workletURL,
      modelURL: VADWEB_CDN + 'silero_vad.onnx',
      // Point ONNX runtime WASM files to CDN
      ortConfig: (ort) => { ort.env.wasm.wasmPaths = ONNXWASM_CDN; },
      // ~500 ms silence = 5 frames × 96 ms/frame (1536 samples @ 16 kHz)
      redemptionFrames: 5,
      onSpeechStart: () => {
        if (!inCall || isProcessingVAD) return;
        micBtn.classList.add('speaking');
        setStatus('Speaking…', 'recording');
      },
      onSpeechEnd: async (audio) => {
        if (!inCall || isProcessingVAD) return;
        micBtn.classList.remove('speaking');
        await handleVADAudio(encodeWAV(audio, 16000));
      },
    });
  }

  // ── Call toggle ───────────────────────────────────────────────────────────────
  async function toggleCall() {
    // Allow ending the call even if processing is in flight
    if (isProcessingVAD) {
      if (inCall) endCall();
      return;
    }

    if (!inCall) {
      ensureAudioContext();
      micBtn.disabled = true;
      try {
        if (!vadInstance) await initVAD();
        vadInstance.start();
        inCall = true;
        micBtn.classList.add('in-call');
        micBtn.innerHTML = ICON_HANG_UP;
        micBtn.title = 'End call';
        hint.textContent = 'Press Space or click to end call';
        setStatus('Listening…', 'listening');
      } catch (err) {
        setStatus('Error: ' + err.message);
        console.error(err);
      } finally {
        micBtn.disabled = false;
      }
    } else {
      endCall();
    }
  }

  function endCall() {
    if (vadInstance) vadInstance.pause();
    inCall = false;
    micBtn.classList.remove('in-call', 'speaking', 'processing');
    micBtn.innerHTML = ICON_PHONE;
    micBtn.title = 'Start call';
    hint.textContent = 'Press Space or click to start a call · Space again to end';
    setStatus('Ready');
  }

  // ── VAD audio pipeline: STT → LLM (SSE) → TTS chunks ────────────────────────
  async function handleVADAudio(wavBlob) {
    if (!inCall) return;
    isProcessingVAD = true;
    audioQueue = [];
    isPlayingAudio = false;
    micBtn.classList.remove('speaking');
    micBtn.classList.add('processing');

    currentAbortController = new AbortController();
    const { signal } = currentAbortController;

    try {
      // ── Step 1: Speech-to-text ──
      setStatus('Transcribing…', 'processing');
      const sttForm = new FormData();
      sttForm.append('audio', wavBlob, 'audio.wav');
      const sttRes  = await fetch('/transcribe', { method: 'POST', body: sttForm, signal });
      const sttData = await sttRes.json();
      if (sttData.error) { setStatus(sttData.error); return; }

      addMessage('user', sttData.transcription);
      setStatus('Thinking…', 'processing');

      // ── Step 2: SSE stream — LLM tokens → sentences → TTS audio chunks ──
      const respondForm = new FormData();
      respondForm.append('text',       sttData.transcription);
      respondForm.append('tts_engine', currentEngine);
      respondForm.append('voice',      voiceSelect.value);
      respondForm.append('llm_engine', currentLlmEngine);

      const res    = await fetch('/respond', { method: 'POST', body: respondForm, signal });
      const reader = res.body.getReader();
      const dec    = new TextDecoder();

      let sseBuffer = '', botEl = null, botText = '';

      async function drainAudioQueue() {
        if (isPlayingAudio) return;
        isPlayingAudio = true;
        while (audioQueue.length > 0) {
          await playAudioB64(audioQueue.shift()).catch(console.error);
        }
        isPlayingAudio = false;
      }

      // SSE read loop
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        sseBuffer += dec.decode(value, { stream: true });
        const lines = sseBuffer.split('\n');
        sseBuffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(line.slice(6)); } catch { continue; }

          if (event.type === 'text') {
            botText += (botText ? ' ' : '') + event.chunk;
            if (!botEl) {
              botEl = addMessage('bot', botText);
              setStatus('Speaking…', 'processing');
            } else {
              botEl.querySelector('.msg-body').textContent = botText;
              chat.scrollTop = chat.scrollHeight;
            }
          } else if (event.type === 'audio') {
            audioQueue.push(event.data);
            drainAudioQueue();
          } else if (event.type === 'error') {
            setStatus('Error: ' + event.message);
          } else if (event.type === 'done') {
            await new Promise(resolve => {
              (function check() {
                if (!isPlayingAudio && audioQueue.length === 0) return resolve();
                setTimeout(check, 50);
              })();
            });
          }
        }
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        setStatus('Error: ' + err.message);
        console.error(err);
      }
    } finally {
      currentAbortController = null;
      isProcessingVAD = false;
      micBtn.classList.remove('processing');
      if (inCall) {
        micBtn.classList.add('in-call');
        setStatus('Listening…', 'listening');
      }
    }
  }

  // ── Event listeners ───────────────────────────────────────────────────────────
  micBtn.addEventListener('click', toggleCall);

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body && !e.repeat) {
      e.preventDefault();
      toggleCall();
    }
  });

  clearBtn.addEventListener('click', async () => {
    await fetch('/clear', { method: 'POST' });
    chat.innerHTML = '';
    addMessage('bot', 'Conversation cleared. Ready to chat!');
    setStatus('Ready');
  });
</script>
</body>
</html>
